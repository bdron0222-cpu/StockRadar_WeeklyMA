name: Stock Radar Automation

on:
  schedule:
    - cron: '0 8 * * *' 
  workflow_dispatch: 

jobs:
  run-scanner:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      
      - name: Update stock list
        run: python generate_watchlist.py
      
      - name: Run scanner
        run: python main.py

      - name: Create heartbeat file
        run: echo "Last run: $(date)" > heartbeat.txt

      - name: Commit and Push results
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-update stock analysis and keep-alive"
          file_pattern: 'results.csv watchlist.csv raw_watchlist.csv heartbeat.txt'
