name: Stock Radar Automation

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  run-scanner:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      
      - name: Update stock list
        run: python generate_watchlist.py
      
      - name: Run scanner
        run: python main.py

      - name: Commit and Push results
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          
          # 建立心跳檔案，確保倉庫活躍
          echo "Last run: $(date)" > heartbeat.txt
          
          # 將檔案加入追蹤 (如果檔案不存在會被忽略，不會報錯)
          git add results.csv watchlist.csv raw_watchlist.csv heartbeat.txt
          
          # 提交並推送到 GitHub
          git commit -m "Auto-update stock analysis and keep-alive" || exit 0
          git push
