name: Stock Radar Automation

on:
  schedule:
    # 設定 UTC 時間 08:00 (對應台灣時間下午 4:00)
    - cron: '0 8 * * *' 
  workflow_dispatch: # 讓你可以在 GitHub 網頁上手動點選執行測試

jobs:
  run-scanner:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 必須保留此權限以允許寫入
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # 1. 生成 raw_watchlist.csv
      - name: Update raw stock list
        run: python generate_watchlist.py

      # 2. 執行 main.py (會自動執行清洗與掃描)
      - name: Run scanner
        run: python main.py

      # 3. 自動 Commit 更新後的結果
      - name: Commit and Push results
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-update stock analysis: $(date +'%Y-%m-%d')"
          file_pattern: 'results.csv watchlist.csv raw_watchlist.csv'