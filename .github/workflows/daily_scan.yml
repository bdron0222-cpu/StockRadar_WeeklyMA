name: Stock Radar Automation

on:
  schedule:
    # 設定 UTC 時間 08:00 (台灣時間下午 4:00)
    - cron: '0 8 * * *' 
  workflow_dispatch: # 讓你可以在 GitHub 網頁上手動點選執行測試

jobs:
  run-scanner:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 重要：允許 GitHub Action 寫入你的儲存庫
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # 執行更新清單 (我們設定為每天檢查，但你可以寫邏輯讓他每三個月才真的抓取)
      - name: Update stock list
        run: python fetch_stocks.py

      # 執行掃描
      - name: Run scanner
        run: python main.py

      # 自動 Commit 更新後的 results.csv 和 stocks.json
      - name: Commit results
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add results.csv stocks.json
          git commit -m "Update stock data: $(date +'%Y-%m-%d')" || exit 0
          git push