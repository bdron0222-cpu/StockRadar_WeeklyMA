name: Stock Radar Automation

on:
  schedule:
    # 設定 UTC 時間 08:00 (對應台灣時間下午 4:00)
    - cron: '0 8 * * *' 
  workflow_dispatch: # 讓你可以在 GitHub 網頁上手動點選執行測試

jobs:
  run-scanner:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 允許 GitHub Action 將更新後的檔案推回儲存庫
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # 執行更新清單
      - name: Update stock list
        run: python fetch_stocks.py

      # 執行掃描
      - name: Run scanner
        run: python main.py

      # 自動 Commit 更新後的結果檔案
      - name: Commit results
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          # 將所有生成的資料檔加入儲存庫
          git add results.csv stocks.json results.json
          # 如果有變更才 commit，避免沒有資料更新時產生報錯
          git commit -m "Update stock data: $(date +'%Y-%m-%d')" || exit 0
          git push