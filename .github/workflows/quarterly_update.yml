name: Quarterly Stock List Update

on:
  schedule:
    # 設定在每季的第一個月（1, 4, 7, 10月）的第一天 00:00 UTC 執行
    - cron: '0 0 1 1,4,7,10 *'
  workflow_dispatch: # 允許你隨時手動點擊執行

jobs:
  update-list:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 必須給予寫入權限才能自動 Push
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install dependencies
        run: pip install pandas yfinance requests
        
      - name: Update stock universe
        # 這行已經幫你改成正確的檔案名稱 generate_watchlist.py
        run: python generate_watchlist.py
        
      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: quarterly update of stock list"
          # 這會自動把這些生成的檔案上傳回 GitHub
          file_pattern: 'watchlist.csv raw_watchlist.csv'